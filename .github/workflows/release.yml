name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux Build ─────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libdbus-1-dev libfontconfig1-dev libportaudio2 \
            fuse libfuse2 wget

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[shell,claude,openai,gemini,dev]"
          pip install pyinstaller
          # Verify the provider SDKs are importable — if any are missing,
          # PyInstaller's collect_all() silently skips them and the packaged
          # build can't switch to that provider at runtime.
          python -c "import anthropic, openai, google.generativeai"

      - name: Build all Linux packages
        run: |
          chmod +x packaging/linux/build-linux.sh
          bash packaging/linux/build-linux.sh all

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.AppImage

  # ── Windows Build ───────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[shell,claude,openai,gemini,dev]"
          pip install pyinstaller
          # Verify the provider SDKs are importable — if any are missing,
          # PyInstaller's collect_all() silently skips them and the packaged
          # build can't switch to that provider at runtime.
          python -c "import anthropic, openai, google.generativeai"

      - name: Generate icons
        run: python packaging/generate_icons.py

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller glance.spec --clean --noconfirm
          if (Test-Path .env.example) { copy .env.example dist\Glance\.env.example }
          if (Test-Path LICENSE) { copy LICENSE dist\Glance\LICENSE }
          if (Test-Path README.md) { copy README.md dist\Glance\README.md }

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Setup.exe installer
        run: iscc installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/Setup-Glance.exe
            dist/Glance/

  # ── Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            linux-packages/*.deb
            linux-packages/*.AppImage
            windows-packages/Setup-Glance.exe
